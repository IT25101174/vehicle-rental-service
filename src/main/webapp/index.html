<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Auto Rentals</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #09090b;
            --surface: #111113;
            --border: rgba(255,255,255,0.08);
            --gold: #f0a500;
            --text: #f4f0ea;
            --muted: #7a7672;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 6%;
            background: rgba(9,9,11,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.01em;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .logo-mark {
            width: 28px; height: 28px;
            background: var(--gold);
            border-radius: 6px;
            display: grid;
            place-items: center;
        }

        .nav-right { display: flex; align-items: center; gap: 1.5rem; }

        .nav-right a {
            text-decoration: none;
            font-size: 0.875rem;
            color: var(--muted);
            transition: color 0.2s;
        }

        .nav-right a:hover { color: var(--text); }

        .nav-cta {
            background: var(--gold) !important;
            color: #000 !important;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-weight: 500 !important;
            transition: opacity 0.2s !important;
        }

        .nav-cta:hover { opacity: 0.85 !important; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 7rem 6% 6rem;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        main::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px; height: 450px;
            background: radial-gradient(ellipse, rgba(240,165,0,0.09) 0%, transparent 68%);
            pointer-events: none;
        }

        main::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 65% at 50% 50%, black 30%, transparent 100%);
            pointer-events: none;
        }

        .hero-inner {
            position: relative;
            z-index: 2;
            max-width: 660px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(240,165,0,0.3);
            background: rgba(240,165,0,0.07);
            border-radius: 100px;
            padding: 0.3rem 0.9rem;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 2rem;
            animation: up 0.6s ease both;
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.8rem, 6.5vw, 4.5rem);
            line-height: 1.06;
            letter-spacing: -0.03em;
            margin-bottom: 1.4rem;
            animation: up 0.6s 0.08s ease both;
        }

        h2 span { color: var(--gold); }

        .hero-desc {
            font-size: 1.05rem;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.75;
            max-width: 440px;
            margin: 0 auto 2.8rem;
            animation: up 0.6s 0.16s ease both;
        }

        .hero-buttons {
            display: flex;
            gap: 0.9rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: up 0.6s 0.24s ease both;
        }

        .btn-main {
            background: var(--gold);
            color: #000;
            text-decoration: none;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: opacity 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-main:hover { opacity: 0.85; transform: translateY(-2px); }

        .btn-outline {
            background: transparent;
            color: var(--text);
            text-decoration: none;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            font-weight: 400;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            transition: border-color 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-outline:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }

        footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 1.4rem;
            font-size: 0.82rem;
            color: var(--muted);
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">
        <span class="logo-mark">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 11L7 3L12 11" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 8.5H10" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </span>
        Intelligent Auto Rentals
    </a>
    <div class="nav-right">
        <a href="login.html">Login</a>
        <a href="register.html" class="nav-cta">Sign Up</a>
    </div>
</nav>

<main>
    <div class="hero-inner">
        <div class="eyebrow">Premium Fleet &nbsp;·&nbsp; Instant Booking</div>
        <h2>Find Your <span>Perfect Drive</span></h2>
        <p class="hero-desc">
            Browse our premium fleet of cars, bikes, and vans. Book instantly and hit the road.
        </p>
        <div class="hero-buttons">
            <a href="vehicles.jsp" class="btn-main">
                Browse Vehicles
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                    <path d="M3 7.5h9M8.5 3.5l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
            <a href="login.html" class="btn-outline">Manage My Bookings</a>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Intelligent Auto Rentals. All rights reserved.</p>
</footer>

</body>
</html>
